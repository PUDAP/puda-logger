[agent]
  interval = "1s"
  flush_interval = "1s"
  metric_batch_size = 100
  metric_buffer_limit = 10000
  omit_hostname = true

# Command requests
[[inputs.nats_consumer]]
  name_override = "commands"
  servers = ["nats://localhost:4222"]
  subjects = ["puda.*.cmd.*"]
  queue_group = "puda_logger_test_cmd_requests"
  data_format = "json_v2"

  [inputs.nats_consumer.tags]
    msg_type = "command"
    status = "sent"

  [[inputs.nats_consumer.json_v2]]
    timestamp_path = "data.header.timestamp"
    timestamp_format = "2006-01-02T15:04:05Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.nats_consumer.json_v2.tag]]
      path = "machine_id"
    [[inputs.nats_consumer.json_v2.tag]]
      path = "topic"
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.header.username"
      rename = "username"
      optional = true
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.header.run_id"
      rename = "run_id"
      optional = true
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.header.user_id"
      rename = "user_id"
      optional = true
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.command.name"
      rename = "cmd_name"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.command.step_number"
      rename = "step_number"
      type = "int"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.command.version"
      rename = "cmd_version"
      optional = true

# Command responses: queue
[[inputs.nats_consumer]]
  name_override = "commands"
  servers = ["nats://localhost:4222"]
  jetstream_subjects = ["puda.*.cmd.response.queue"]
  jetstream_stream = "RESPONSE_QUEUE"
  queue_group = "puda_logger_test_cmd_responses_queue"
  data_format = "json_v2"

  [inputs.nats_consumer.tags]
    msg_type = "response"

  [[inputs.nats_consumer.json_v2]]
    timestamp_path = "data.header.timestamp"
    timestamp_format = "2006-01-02T15:04:05Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.nats_consumer.json_v2.tag]]
      path = "machine_id"
    [[inputs.nats_consumer.json_v2.tag]]
      path = "topic"
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.header.username"
      rename = "username"
      optional = true
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.header.run_id"
      rename = "run_id"
      optional = true
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.response.status"
      rename = "status"
      optional = true
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.header.user_id"
      rename = "user_id"
      optional = true
    [[inputs.nats_consumer.json_v2.tag]]
      path = "data.command.name"
      rename = "cmd_name"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.command.step_number"
      rename = "step_number"
      type = "int"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.command.version"
      rename = "cmd_version"
      optional = true
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.response.code"
      rename = "response_code"
      type = "string"
      optional = true
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.response.message"
      rename = "response_message"
      optional = true
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.response.completed_at"
      rename = "completed_at"
      optional = true

