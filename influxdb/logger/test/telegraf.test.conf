# Telemetry
[[inputs.nats_consumer]]
  name_override = "telemetry"
  servers = ["nats://localhost:4222"]
  subjects = ["puda.*.tlm.health"]
  queue_group = "puda_logger_test_telemetry"
  data_format = "json_v2"

  [[inputs.nats_consumer.json_v2]]
    timestamp_path = "data.timestamp"
    timestamp_format = "2006-01-02T15:04:05Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.nats_consumer.json_v2.tag]]
      path = "machine_id"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.cpu"
      type = "float"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.mem"
      type = "float"
    [[inputs.nats_consumer.json_v2.field]]
      path = "data.temp"
      type = "float"

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
