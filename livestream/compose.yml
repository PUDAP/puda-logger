services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-logger
    ports:
      - "9996:9996"   # HTTP playback server
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ${RECORDINGS_DIR:-./recordings}:/recordings
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
